            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fff8f2] dark:bg-[#1e1b16] w-full top-0 z-50 shadow-[0_32px_32px_rgba(30,27,22,0.04)] sticky">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button class="text-[#334537] opacity-70 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-wide text-[#334537] dark:text-[#c3c8c1]">提交成功</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-grow flex flex-col items-center px-6 pt-12 pb-24 max-w-2xl mx-auto w-full">
<!-- Visual Header: Asymmetric Layout -->
<div class="relative w-full mb-12">
<div class="aspect-[4/3] w-full rounded-xl overflow-hidden bg-surface-container-low shadow-sm">
<img alt="Peaceful garden seedling" class="w-full h-full object-cover" data-alt="Close-up of a delicate green seedling sprouting from rich dark soil in a sun-drenched greenhouse with soft bokeh background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzPraVPwzXuxK1mt0HzUUcT7K6EP4tpBr0DPzcHtAYWDHkf6bplNa4SGB_gyOA3F1IEQRYp3a9pXBspFFKII7PzexwZu4tNu0hbEb1pmuk11zdFR8fp-kizJuSJYhfcGAihCQfHdptpGGA07gCJW-B1JRvqdvn7x58XHiNpaKcvZO2pZMeIdbiPdUvDm6Ny_kn_ohqgo-QSvqum1ait-_tCQKVWbd9OvWosP6FjYcMr61FvOVII__7kg5Sy25I5PIxV6BsoSs8zNAx"/>
</div>
<!-- Decorative Element -->
<div class="absolute -bottom-6 -right-4 w-32 h-32 bg-secondary-container rounded-xl opacity-20 -z-10 rotate-12"></div>
</div>
<!-- Main Status -->
<div class="text-center space-y-4 mb-10">
<h2 class="text-4xl font-headline font-extrabold text-primary tracking-tight">提交成功</h2>
<div class="inline-flex items-center justify-center px-4 py-1 bg-secondary-container text-on-secondary-container text-xs font-bold rounded-full uppercase tracking-widest">
                Demand Received
            </div>
</div>
<!-- Confirmation Message Card -->
<div class="bg-surface-container-low rounded-xl p-8 mb-6 w-full text-center">
<p class="text-on-surface-variant leading-relaxed text-lg">
                我们已经收到您的需求信息，后续会根据您填写的内容尽快与您联系。
            </p>
</div>
<!-- Next Steps -->
<div class="w-full mb-12 px-2">
<h3 class="text-secondary font-bold text-sm mb-3 tracking-wide">后续步骤</h3>
<p class="text-on-surface opacity-80 leading-relaxed">
                您也可以继续查看案例、浏览空间专题，或通过在线客服补充更多资料。
            </p>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-4">
<button class="w-full py-4 bg-primary text-on-primary font-bold rounded-full shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>查看案例</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full py-4 bg-surface-container-highest text-primary font-bold rounded-full hover:bg-surface-container-high active:scale-[0.98] transition-all">
                返回首页
            </button>
<button class="w-full py-4 flex items-center justify-center gap-2 text-secondary font-semibold hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
<span>联系客服</span>
</button>
</div>
<!-- Editorial Feature Grid (Bento Style) -->
<div class="w-full mt-16 grid grid-cols-2 gap-4">
<div class="col-span-2 bg-white rounded-xl p-6 flex flex-col justify-between h-48 relative overflow-hidden group">
<div class="z-10">
<span class="text-[10px] font-bold tracking-widest text-secondary uppercase">Recommended</span>
<h4 class="text-xl font-headline font-bold text-primary mt-1">2024 春季造园特辑</h4>
</div>
<img class="absolute top-0 right-0 w-1/2 h-full object-cover opacity-20 group-hover:scale-110 transition-transform duration-700" data-alt="Lush private garden with a stone path and blooming lavender under warm morning sunlight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJOYp4LZRfEFl7SuveVJZh7e2lwYf9Yi4A1a_EW9xSCnXaVwnwizgDCyKoXMea2ezUw_rMYffAHjpZmaA6au3KR83fs4KcztA6T-7wDfczBHTBDaNKFhkZkavUd9q7LiN0akgsCkyNHj6soV1Q-_IwNF5jJkoh3sIbL77e5Np2w9xgiLyJlfpjEL2-VYzvBoI4hvCIAkqjw-ZuHyXKzxlzttcY7J4mXgbU6yFxCU9jojdzVZ3yX5QHgcRsz_F8UvB-B0z4m_cb15tQ"/>
<button class="z-10 self-start text-xs font-bold border-b border-primary pb-0.5">立即浏览</button>
</div>
<div class="bg-surface-container-high rounded-xl p-5 flex flex-col justify-center items-center text-center">
<span class="material-symbols-outlined text-primary mb-2" data-icon="local_florist">local_florist</span>
<p class="text-[11px] font-bold text-primary">养护指南</p>
</div>
<div class="bg-secondary-container/30 rounded-xl p-5 flex flex-col justify-center items-center text-center">
<span class="material-symbols-outlined text-secondary mb-2" data-icon="calendar_month">calendar_month</span>
<p class="text-[11px] font-bold text-secondary">预约工坊</p>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden based on "Transactional" rule, but included for context if needed by user settings. Suppression active for Success Screen.) -->
